services:
  kong-database:
    image: postgres:13
    container_name: kong-database
    environment:
      POSTGRES_USER: kong
      POSTGRES_DB: kong
      POSTGRES_PASSWORD: kong

  kong-migration:
    image: kong:3.6
    command: kong migrations bootstrap
    depends_on:
      - kong-database
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong

  kong:
    image: kong:3.6
    container_name: kong
    depends_on:
      - kong-migration
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - '8000:8000'
      - '8001:8001'

  kong-config:
    image: kong/deck
    depends_on:
      - kong
    volumes:
      - ./kong.yml:/kong/kong.yml
    entrypoint: >
      sh -c "
      sleep 15 &&
      deck gateway sync /kong/kong.yml --kong-addr http://kong:8001
      "
