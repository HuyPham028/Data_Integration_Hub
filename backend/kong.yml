_format_version: '3.0'

services:
  - name: auth-service
    url: http://backend:4000/api/v1
    routes:
      - name: auth-route
        paths:
          - /auth
        strip_path: false

  - name: user-service
    url: http://backend:4000/api/v1
    routes:
      - name: user-route
        paths:
          - /users
        strip_path: false

  - name: role-service
    url: http://backend:4000/api/v1
    routes:
      - name: role-route
        paths:
          - /roles
        strip_path: false

  - name: data-hub-service
    url: http://backend:4000/api/v1
    routes:
      - name: hub-routes
        paths:
          - /integration
          - /jobs
          - /schema-registry
          - /event-logs
          - /backup
        strip_path: false

plugins:
  - name: prometheus
  - name: cors
    config:
      origins:
        - http://localhost:3001
        - http://localhost:3000
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - Origin
        - X-Requested-With
      exposed_headers:
        - Authorization
      credentials: true
      max_age: 3600