_format_version: '3.0'

services:
  - name: auth-service
    url: http://backend:4000/api/v1
    routes:
      - name: auth-route
        paths:
          - /auth
        strip_path: false

  - name: user-service
    url: http://backend:4000/api/v1
    routes:
      - name: user-route
        paths:
          - /users
        strip_path: false

  - name: role-service
    url: http://backend:4000/api/v1
    routes:
      - name: role-route
        paths:
          - /roles
        strip_path: false

  - name: data-hub-service
    url: http://backend:4000/api/v1
    routes:
      - name: hub-routes
        paths:
          - /integration
          - /jobs
          - /schema-registry
          - /event-logs
          - /backup
          - /api/master-data
          - /tables
          - /source-configs
          - /notifications
          - /api-logs
          - /views
        strip_path: false

  - name: metrics-internal-service
    url: http://backend:4000/api/v1
    routes:
      - name: metrics-internal-route
        paths:
          - /metrics
        strip_path: false

plugins:
  - name: prometheus
    config:
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true
  - name: rate-limiting
    config:
      minute: 60
      policy: local
      limit_by: ip
      error_code: 429
      error_message: 'Quá nhiều yêu cầu. Vui lòng thử lại sau.'
  - name: cors
    config:
      origins:
        - http://localhost:3001
        - http://localhost:3000
        - http://54.252.99.115:3000
        - http://10.8.0.1:3000
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - Origin
        - X-Requested-With
      exposed_headers:
        - Authorization
      credentials: true
      max_age: 3600
