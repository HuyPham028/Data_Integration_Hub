name: CI Pipeline

on:
  push:
    branches: ["**"]     # chạy CI trên tất cả branch
  pull_request:
    branches: ["master"] # chỉ check PR vào master

env:
  NODE_VERSION: "24"

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npm run build

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Build Next.js
        env:
          NEXT_PUBLIC_KONG_URL: ${{ vars.NEXT_PUBLIC_KONG_URL || 'http://localhost:8000' }}
        run: npm run build

  unit-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate

      - name: Run unit tests (41 tests)
        run: npm test

  docker-compose-test:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, unit-test]

    steps:
      - uses: actions/checkout@v4

      - name: Prepare env
        run: cp .env.example .env

      - name: Build containers
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for services
        run: sleep 20

      - name: Show running containers
        run: docker ps

      - name: Test Kong Gateway
        run: curl --fail http://localhost:8001 || exit 1

      - name: Shutdown
        if: always()
        run: docker compose down -v

  docker-push:
    runs-on: ubuntu-latest
    needs: docker-compose-test
    if: github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build images
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: docker compose build

      - name: Push images
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: docker compose push

  deploy-ec2:
    runs-on: ubuntu-latest
    needs: docker-push
    if: github.ref == 'refs/heads/master'

    steps:
      - name: SSH to EC2 & deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/ec2-user/Data_Integration_Hub

            echo "==> Pulling latest code..."
            git pull origin master

            echo "==> Rebuilding and restarting services..."
            docker compose up -d --build

            echo "==> Cleaning up old images..."
            docker image prune -f

            echo "==> Deploy complete."