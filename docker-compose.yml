services:
  # 1. CORE DATA HUB
  postgres-core:
    image: postgres:17-alpine
    container_name: postgres-core
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_core:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - univ_hub_network

  minio:
    image: minio/minio:latest
    container_name: data-hub-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - univ_hub_network

  backend:
    build:
      context: ./backend
    image: ${DOCKER_USERNAME:-local}/hub-backend:latest
    container_name: hub-backend
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-core:5432/${POSTGRES_DB}?schema=public
      MONGO_URI: ${MONGO_URI}
      SOURCE_API_BASE_URL: ${SOURCE_API_BASE_URL}
      SOURCE_API_TOKEN: ${SOURCE_API_TOKEN}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}

      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_USE_SSL: "false"
    ports:
      - "4000:4000"
    depends_on:
      postgres-core:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - univ_hub_network

  # 2. KONG API GATEWAY
  kong-database:
    image: postgres:17-alpine
    container_name: kong-database
    environment:
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: kong
      POSTGRES_DB: kong
    volumes:
      - pgdata_kong:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - univ_hub_network

  kong-migration:
    image: kong:3.6
    container_name: kong-migration
    command: kong migrations bootstrap
    depends_on:
      kong-database:
        condition: service_healthy
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
      KONG_PG_DATABASE: kong
    networks:
      - univ_hub_network

  kong:
    image: kong:3.6
    container_name: kong-gateway
    depends_on:
      kong-migration:
        condition: service_completed_successfully
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
      KONG_PG_DATABASE: kong

      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001

      KONG_PLUGINS: bundled
    ports:
      - "8000:8000"
      - "8001:8001"
    networks:
      - univ_hub_network

  kong-config:
    image: kong/deck
    container_name: kong-deck-sync
    depends_on:
      - kong
    volumes:
      - ./backend/kong.yml:/kong/kong.yml
    entrypoint: >
      sh -c "
      until deck gateway ping --kong-addr http://kong:8001; do
        echo 'Waiting for Kong...';
        sleep 2;
      done;
      deck gateway sync /kong/kong.yml --kong-addr http://kong:8001
      "
    networks:
      - univ_hub_network

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./backend/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - kong
    networks:
      - univ_hub_network

  grafana:
    image: grafana/grafana
    container_name: grafana
    environment:
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: smtp.gmail.com:587
      GF_SMTP_USER: ${GRAFANA_SMTP_USER}
      GF_SMTP_PASSWORD: ${GRAFANA_SMTP_PASSWORD}
      GF_SMTP_FROM_ADDRESS: ${GRAFANA_SMTP_USER}
      GF_SMTP_SKIP_VERIFY: "true"
    ports:
      - "5000:3000"
    networks:
      - univ_hub_network

  # 4. FRONTEND
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_KONG_URL: ${NEXT_PUBLIC_KONG_URL}
    image: ${DOCKER_USERNAME:-local}/hub-frontend:latest 
    container_name: hub-frontend
    ports:
      - "3000:3000"
    depends_on:
      - kong
    networks:
      - univ_hub_network

volumes:
  pgdata_core:
  pgdata_kong:
  minio_data:

networks:
  univ_hub_network:
    driver: bridge