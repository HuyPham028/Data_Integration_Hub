services:
  # 1. CORE DATA HUB
  postgres-core:
    image: postgres:17-alpine
    container_name: postgres-core
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root123}
      POSTGRES_DB: ${POSTGRES_DB:-hub_core_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_core:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - univ_hub_network

  backend:
    build:
      context: ./backend
    container_name: hub-backend
    environment:
      - PORT=${PORT}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-root123}@postgres-core:5432/${POSTGRES_DB:-hub_core_db}?schema=public
      - MONGO_URI=${MONGO_URI}
      - SOURCE_API_BASE_URL=${SOURCE_API_BASE_URL}
      - SOURCE_API_TOKEN=${SOURCE_API_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
    ports:
      - "4000:4000"
    depends_on:
      postgres-core:
        condition: service_healthy
    networks:
      - univ_hub_network

  # 2. KONG API GATEWAY
  kong-database:
    image: postgres:17-alpine
    container_name: kong-database
    environment:
      POSTGRES_USER: kong
      POSTGRES_DB: kong
      POSTGRES_PASSWORD: kong
    volumes:
      - pgdata_kong:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - univ_hub_network

  kong-migration:
    image: kong:3.6
    container_name: kong-migration
    command: kong migrations bootstrap
    depends_on:
      kong-database:
        condition: service_healthy
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
    networks:
      - univ_hub_network

  kong:
    image: kong:3.6
    container_name: kong-gateway
    depends_on:
      kong-migration:
        condition: service_completed_successfully
      backend:
        condition: service_started
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      # CORS enable
      KONG_PLUGINS: bundled
    ports:
      - '8000:8000' # Port cho Frontend gọi
      - '8001:8001' # Port xuất Metrics & Admin
    networks:
      - univ_hub_network

  kong-config:
    image: kong/deck
    container_name: kong-deck-sync
    depends_on:
      - kong
    volumes:
      - ./backend/kong.yml:/kong/kong.yml
    entrypoint: >
      sh -c "sleep 10 && deck gateway sync /kong/kong.yml --kong-addr http://kong:8001"
    networks:
      - univ_hub_network

  # 3. MONITORING: PROMETHEUS & GRAFANA
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./backend/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - kong
    networks:
      - univ_hub_network

  grafana:
    image: grafana/grafana
    container_name: grafana
    environment:
      GF_SMTP_ENABLED: 'true'
      GF_SMTP_HOST: smtp.gmail.com:587
      GF_SMTP_USER: ${GRAFANA_SMTP_USER}
      GF_SMTP_PASSWORD: ${GRAFANA_SMTP_PASSWORD}
      GF_SMTP_FROM_ADDRESS: ${GRAFANA_SMTP_USER}
      GF_SMTP_SKIP_VERIFY: 'true'
      GF_SECURITY_ALLOW_EMBEDDING: 'true'
      GF_SECURITY_COOKIE_SAMESITE: 'none'
      GF_SECURITY_COOKIE_SECURE: 'true'
    ports:
      - '5000:3000'
    networks:
      - univ_hub_network

  # 4. FRONTEND
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_KONG_URL: ${NEXT_PUBLIC_KONG_URL}
    container_name: hub-frontend
    ports:
      - "3000:3000"
    depends_on:
      - kong
    networks:
      - univ_hub_network

volumes:
  pgdata_core:
  pgdata_kong:

networks:
  univ_hub_network:
    driver: bridge